<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clube Bolter</title>
    
    <!-- Fontes e Ícones -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        /* --- CONFIGURAÇÕES BASE E RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            background-color: #031448; 
            overflow-x: hidden;
            font-family: 'Arial', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* --- MENU LATERAL GLASSMORPHISM --- */
        .menu-toggle {
            position: fixed; top: 30px; right: 40px; width: 45px; height: 45px;
            z-index: 10001; cursor: pointer; display: flex; flex-direction: column;
            justify-content: center; align-items: center; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; backdrop-filter: blur(5px); border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .menu-toggle span { width: 22px; height: 2px; background-color: #031448; margin: 2px 0; transition: 0.4s; }
        .menu-toggle.is-open span { background-color: #ffffff; }
        .menu-toggle.is-open span:nth-child(1) { transform: rotate(45deg) translate(4px, 4px); }
        .menu-toggle.is-open span:nth-child(2) { opacity: 0; }
        .menu-toggle.is-open span:nth-child(3) { transform: rotate(-45deg) translate(4px, -4px); }

        .side-menu {
            position: fixed; top: 0; right: -100%; width: 350px; height: 100vh;
            z-index: 10000; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); border-left: 1px solid rgba(255, 255, 255, 0.2); 
            transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            display: flex; flex-direction: column; justify-content: center; padding: 60px;
        }
        .side-menu.is-open { right: 0; }

        /* Ajuste do container de navegação para evitar links grudados */
        .side-menu nav { 
            display: flex; 
            flex-direction: column; 
            gap: 35px; 
            width: 100%;
        }

        .menu-link {
            font-family: 'Playfair Display', serif; font-size: 26px; color: #ffffff;
            text-decoration: none; opacity: 0; transform: translateX(30px);
            transition: 0.4s ease; position: relative; display: block;
        }
        .menu-link::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 1px; background-color: #ffffff; transition: 0.3s; }
        .menu-link:hover::after { width: 100%; }

        .side-menu.is-open .menu-link { opacity: 1; transform: translateX(0); }
        .side-menu.is-open .menu-link:nth-child(1) { transition-delay: 0.3s; }
        .side-menu.is-open .menu-link:nth-child(2) { transition-delay: 0.4s; }
        .side-menu.is-open .menu-link:nth-child(3) { transition-delay: 0.5s; }

        .menu-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(3, 20, 72, 0.4); z-index: 9999; opacity: 0; pointer-events: none; transition: 0.6s; }
        .menu-overlay.is-open { opacity: 1; pointer-events: auto; }

        /* --- HERO SECTION --- */
        .hero-section { display: flex; height: 100vh; width: 100vw; position: relative; }
        .left-content { flex: 1; display: flex; align-items: center; justify-content: center; z-index: 2; padding: 5%; }
        .right-content {
            flex: 1.1; background-color: #ffffff;
            border-top-left-radius: 50% 100%; border-bottom-left-radius: 50% 100%;
            display: flex; align-items: center; justify-content: center; z-index: 1;
        }
        .visual-center-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            width: 70%; max-width: 500px; margin-left: 15%;
        }
        .img-container { position: relative; width: 100%; display: flex; justify-content: center; }
        .img-container img { width: 100%; max-width: 100%; height: auto; transition: opacity 0.8s; display: block; }
        .img-container img.static { position: absolute; top: 0; opacity: 0; }
        .is-active img.gif { opacity: 0; }
        .is-active img.static { opacity: 1; }
        .welcome-box { width: 100%; max-width: 450px; }

        /* --- CONTEÚDO EXTRA E VÍDEO --- */
        .extra-section { padding: 80px 5%; display: flex; flex-direction: column; align-items: center; gap: 60px; }
        .extra-img-box { width: 100%; max-width: 700px; opacity: 0; transform: translateY(40px); transition: 1.2s; }
        .extra-img-box.reveal { opacity: 1; transform: translateY(0); }
        .extra-img-box img { width: 100%; max-width: 100%; height: auto; display: block; }
        
        .video-section { width: 100%; padding: 40px 5% 100px 5%; display: flex; justify-content: center; opacity: 0; transform: translateY(40px); transition: 1.2s; }
        .video-section.reveal { opacity: 1; transform: translateY(0); }
        .video-wrapper { width: 100%; max-width: 900px; border-radius: 15px; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.4); }

        /* --- ZONAS CINEMATOGRÁFICAS --- */
        .cinematic-zone-green { background-color: #91ce8e; position: relative; }
        .cinematic-zone-blue { background-color: #2181bf; position: relative; }
        .sticky-box { position: sticky; top: 0; height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; overflow: hidden;}
        .full-img { position: absolute; width: 100%; height: 100%; object-fit: contain; opacity: 0; transition: 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .visible { opacity: 1 !important; }
        .grad-navy-green { height: 60vh; background: linear-gradient(to bottom, #031448, #91ce8e); }
        .grad-green-blue { height: 80vh; background: linear-gradient(to bottom, #91ce8e, #2181bf); }
        .grad-blue-navy { height: 60vh; background: linear-gradient(to bottom, #2181bf, #031448); }
        .trigger-area { height: 200vh; position: relative; }

        /* --- RODAPÉ --- */
        .main-footer { background-color: #031448; color: #ffffff; padding: 80px 8% 40px 8%; border-top: 1px solid rgba(255, 255, 255, 0.1); }
        .footer-container { display: grid; grid-template-columns: 1fr 1.5fr; gap: 50px; max-width: 1200px; margin: 0 auto; }
        .footer-logo { font-family: 'Playfair Display', serif; font-size: 42px; font-weight: 700; margin-bottom: 5px; }
        .footer-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: 18px; opacity: 0.8; margin-bottom: 30px; }
        .footer-copyright-desktop { font-size: 13px; opacity: 0.5; line-height: 1.6; margin-top: 50px; }
        .social-container-official { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 40px; }
        .social-pill { text-decoration: none; color: #ffffff; display: flex; align-items: center; gap: 10px; font-size: 14px; padding: 10px 20px; border-radius: 50px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); transition: 0.3s; }
        .instagram-pill:hover { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%); color: white; border: none; }
        .facebook-pill:hover { background-color: #1877F2; color: white; border: none; }
        .x-pill:hover { background-color: #000000; color: white; border: none; }
        .tiktok-pill:hover { background-color: #010101; color: white; border: none; }
        .whatsapp-link { display: inline-flex; align-items: center; gap: 12px; text-decoration: none; color: #ffffff; font-family: 'Playfair Display', serif; font-size: 26px; }
        .whatsapp-link i { color: #25D366; font-size: 30px; }
        .footer-bottom-mobile { display: none; text-align: center; padding-top: 40px; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px; font-size: 14px; opacity: 0.5; }

        /* --- MOBILE --- */
        @media (max-width: 768px) {
            .menu-toggle { right: 20px; top: 20px; }
            
            /* Correção do painel lateral no mobile */
            .side-menu { 
                width: 100%; 
                padding: 40px;
                right: -100%;
            }
            .side-menu nav {
                align-items: center;
                text-align: center;
                gap: 45px; /* Espaço maior entre os itens no mobile */
            }
            .menu-link {
                font-size: 24px;
                width: 100%;
            }

            .hero-section { flex-direction: column; height: auto; min-height: 100vh; }
            .left-content { height: 40vh; padding: 60px 10% 20px 10%; background-color: #031448; }
            .right-content { 
                height: 60vh; border-top-left-radius: 50% 15%; border-top-right-radius: 50% 15%; 
                border-bottom-left-radius: 0; margin-top: -5vh; padding: 60px 10%; 
            }
            .visual-center-wrapper { margin-left: 0; width: 100%; }
            .welcome-box { max-width: 280px; }
            .extra-img-box { width: 100% !important; }
            .footer-container { grid-template-columns: 1fr; text-align: center; }
            .social-container-official { justify-content: center; }
            .footer-copyright-desktop { display: none; }
            .footer-bottom-mobile { display: block; }
        }
    </style>
</head>
<body>

    <!-- MENU -->
    <div class="menu-toggle" id="menu-btn"><span></span><span></span><span></span></div>
    <div class="menu-overlay" id="menu-overlay"></div>
    <aside class="side-menu" id="side-menu">
        <nav>
            <a href="https://login.bolter.com.br" class="menu-link">Área do Associado</a>
            <a href="?materia=biblioteca" class="menu-link">biblioteca</a>
            <a href="https://www.bolter.com.br/planos-de-ades%C3%A3o" class="menu-link">Associe-se!</a>

    </aside>

    <!-- HERO -->
    <section class="hero-section">
        <div class="left-content">
            <div class="img-container welcome-box" id="box-welcome">
                <img src="https://i.imgur.com/1bclwjj.gif" class="gif"><img src="https://i.imgur.com/Q4RPE5w.png" class="static">

        <div class="right-content">
            <div class="visual-center-wrapper">
                <div class="img-container" id="box-logo">

    <!-- EXTRAS -->
    <section class="extra-section">
        <div class="extra-img-box js-scroll-reveal"><img id="extra-1" src="https://i.imgur.com/YDW2pHF.png"></div>
        <div class="extra-img-box js-scroll-reveal"><img id="extra-2" src="https://i.imgur.com/CfWAwQK.png"></div>
    </section>

    <!-- VÍDEO -->
    <section class="video-section js-scroll-reveal">
        <div class="video-wrapper">
            <iframe style="width:100%; aspect-ratio:16 / 9; border: none; display: block;" src="https://odysee.com/%24/embed/%40bolterclube%3A4%2FApresenta%C3%A7%C3%B5es-Maio-2026%3Acbb4d9cd1b?r=6PE5MiPpknJNrSLCVMsX7LqXMcdqHs2K&signature=6398e00b20c837da890e115f31edab243ffc85d1f1dac1314945116ac8abe76803ec489dd990f5b3df234372047c289f908fbe3d10e2783c28e21ae34567b889&signature_ts=1779758171" allowfullscreen></iframe>
        </div>
    </section>

    <!-- ZONAS CINEMATOGRÁFICAS -->
    <div class="cinematic-zone-green">
        <div class="grad-navy-green"></div>
        <section class="trigger-area" id="trigger-green">
            <div class="sticky-box">
                <img id="g-img-1" src="https://i.imgur.com/c3qHtZ6.png" class="full-img">
                <img id="g-img-2" src="https://i.imgur.com/bKnVhs9.png" class="full-img">

    <div class="cinematic-zone-blue">

        <section class="trigger-area" id="trigger-blue">
            <div class="sticky-box">
                <img id="b-img-1" src="https://i.imgur.com/qkRSzXc.png" class="full-img">
                <img id="b-img-2" src="https://i.imgur.com/PiQnOqQ.png" class="full-img">
            </div>
        </section>

    </div>

    <!-- RODAPÉ -->
    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-column brand-col">

            </div>
            <div class="footer-column links-col">

                    <a href="https://instagram.com/bolterclube" target="_blank" class="social-pill instagram-pill"><i class="fab fa-instagram"></i> <span>@bolterclube</span></a>
                    <a href="https://www.facebook.com/profile.php?id=61582409735354" target="_blank" class="social-pill facebook-pill"><i class="fab fa-facebook-f"></i> <span>@clubebolter</span></a>

    <!-- SCRIPTS -->
    <script>
        // Imagens Mobile
        function checkMobileImages() {
            if (window.innerWidth <= 768) {
                const mobileImages = {
                    'extra-1': 'https://i.imgur.com/OEvVdBJ.png',
                    'extra-2': 'https://i.imgur.com/plZ8Yim.png',
                    'g-img-1': 'https://i.imgur.com/hFmCa1Q.png',
                    'g-img-2': 'https://i.imgur.com/KnjkMv7.png',
                    'b-img-1': 'https://i.imgur.com/nbnap8z.png',
                    'b-img-2': 'https://i.imgur.com/1BnC4xu.png'
                };
                for (let id in mobileImages) {
                    const el = document.getElementById(id);
                    if (el) el.src = mobileImages[id];
                }
            }
        }
        checkMobileImages();

        // Menu
        const menuBtn = document.getElementById('menu-btn'), sideMenu = document.getElementById('side-menu'), menuOverlay = document.getElementById('menu-overlay');
        function toggleMenu() { menuBtn.classList.toggle('is-open'); sideMenu.classList.toggle('is-open'); menuOverlay.classList.toggle('is-open'); }
        menuBtn.addEventListener('click', toggleMenu); menuOverlay.addEventListener('click', toggleMenu);

        // Hero
        window.addEventListener('load', () => { setTimeout(() => { ['box-welcome', 'box-logo'].forEach(id => document.getElementById(id)?.classList.add('is-active')); }, 800); });
        const revealObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('reveal'); }); }, { threshold: 0.1 });
        document.querySelectorAll('.js-scroll-reveal').forEach(el => revealObserver.observe(el));

        // Cinematic
        function playAnimation(imgIds) {
            const imgs = imgIds.map(id => document.getElementById(id));
            if(!imgs[0]) return;
            imgs[0].classList.add('visible');
            setTimeout(() => { imgs[0].classList.remove('visible'); imgs[1].classList.add('visible'); }, 1800);
        }
        let gStarted = false, bStarted = false;
        const gObs = new IntersectionObserver((entries) => { if (entries[0].isIntersecting && !gStarted) { gStarted = true; playAnimation(['g-img-1', 'g-img-2']); } }, { threshold: 0.3 });
        const bObs = new IntersectionObserver((entries) => { if (entries[0].isIntersecting && !bStarted) { bStarted = true; playAnimation(['b-img-1', 'b-img-2']); } }, { threshold: 0.3 });
        gObs.observe(document.getElementById('trigger-green'));
        bObs.observe(document.getElementById('trigger-blue'));

        // Proteção
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.onkeydown = e => {
            if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
        };
    </script>
</body>
</html>
